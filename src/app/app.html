<div class="app-layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="imagem-logo">
                <img src="/images/MA-logo.png" alt="Logo Motoboy Assistant">
            </div>

            <div class="texto-logo">
                <strong>Motoboy</strong>
                <span>Assistant</span>
            </div>
        </div>

        <nav class="menu">
            <a class="menu-item" routerLink="/corridas" routerLinkActive="active">
                <span class="material-symbols-outlined">two_wheeler</span>
                <span>Corridas</span>
            </a>

            <a class="menu-item" href="#">
                <span class="material-symbols-outlined">settings</span>
                <span>Configurações</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <p>© 2026 Motoboy Assistant</p>
            <span>v1.0.0</span>
        </div>
    </aside>
    <main class="main-content">
        <header class="topbar">
            <div class="topbar-left"></div>

            <div class="topbar-center">
                <div class="search-box">
                    <span class="material-symbols-outlined">search</span>
                    <input type="text" placeholder="Buscar corridas, observações..." [(ngModel)]="searchTerm" (input)="applyTopbarFilters()">
                </div>
            </div>

            <div class="topbar-right">
                <div class="topbar-date-range">
                    <div class="date-range-button" (click)="picker.open()">
                        <span class="material-symbols-outlined calendar-icon">calendar_month</span>

                        <span class="date-range-text">
                            {{ dateRangeLabel }}
                        </span>

                        <span class="material-symbols-outlined arrow-icon">expand_more</span>
                    </div>

                    <mat-form-field class="date-range-hidden">
                        <mat-date-range-input [rangePicker]="picker">
                            <input matStartDate [(ngModel)]="startDate" (dateChange)="applyTopbarFilters()">
                            <input matEndDate [(ngModel)]="endDate" (dateChange)="applyTopbarFilters()">
                        </mat-date-range-input>

                        <mat-date-range-picker #picker></mat-date-range-picker>
                    </mat-form-field>
                </div>

                <div class="perfil">
                    <a href="#" class="perfil-button">
                        <span class="material-symbols-outlined">person</span>
                    </a>
                </div>
            </div>
        </header>

        <section class="conteudo">
            <router-outlet></router-outlet>
        </section>
    </main>
</div>
